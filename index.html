<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cronograma PRO</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, getDocs, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBc7jh4dai3OZIriKdFxguI44A73TRKYTI",
      authDomain: "cronograma-pro-ray.firebaseapp.com",
      projectId: "cronograma-pro-ray",
      storageBucket: "cronograma-pro-ray.firebasestorage.app",
      messagingSenderId: "358433192984",
      appId: "1:358433192984:web:5af60313307f9bfadc176d"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const ADMIN_EMAIL = "obras@admin.com";
    const ADMIN_SENHA = "35343535";

    const fmtMoney = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v)||0);
    const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const fileBaseName = n => String(n||'').replace(/\.[^.]+$/,'');
    function norm(v){ return String(v??'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
    const isNum = v => v!=='' && !isNaN(Number(v)) && isFinite(Number(v));
    const parseMoney = s => Number(String(s||'').replace(/[R$\s.]/g,'').replace(',','.')) || 0;

    function calcPctGeral(resumo, itens){
      const vca = Number(resumo?.valorContratoAditivo) || 0;
      const acu = Number(resumo?.acumuladoTotal)       || 0;
      if(vca > 0 && acu > 0) return +(acu / vca * 100).toFixed(2);
      const tvc = (itens||[]).reduce((a,i)=>a+(Number(i.valorContrato)||0),0);
      const tac = (itens||[]).reduce((a,i)=>a+(Number(i.acumulado)||0),0);
      return tvc > 0 ? +(tac / tvc * 100).toFixed(2) : 0;
    }

    let currentUser = null, isAdmin = false;
    let unsubObras = null, unsubAllObras = null;
    let obras = [], selectedObraId = null, rows = [], sourceContrato = null;
    let chartInstance = null, adminChartInstance = null;
    let allUsersData = {};
    let adminUnsubMap = {};
    let adminSelectedUid = null, adminSelectedObraId = null;
    let colabFormReady = false;

    const $ = id => document.getElementById(id);
    function showView(name){
      ['loginView','appView','adminView'].forEach(v=>$(v).style.display='none');
      $(name).style.display = name==='loginView' ? 'flex' : 'block';
    }

    onAuthStateChanged(auth, async user => {
      currentUser = user;
      if(!user){ showView('loginView'); return; }
      const snap = await getDoc(doc(db,'users',user.uid));
      const data = snap.exists() ? snap.data() : {};
      isAdmin = data.role === 'admin';
      if(isAdmin){ initAdminView(); }
      else        { initUserView(); }
    });

    $('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = $('loginEmail').value.trim();
      const senha = $('loginSenha').value;
      const btn = $('loginBtn'); btn.disabled=true; btn.textContent='Entrando...';
      $('loginError').style.display='none';
      try{
        await signInWithEmailAndPassword(auth, email, senha);
      } catch(err){
        $('loginError').textContent = 'E-mail ou senha inválidos.';
        $('loginError').style.display='block';
      } finally{ btn.disabled=false; btn.textContent='Entrar'; }
    });

    $('logoutBtnAdmin').addEventListener('click', () => { cleanupListeners(); signOut(auth); });
    $('logoutBtnUser' ).addEventListener('click', () => { cleanupListeners(); signOut(auth); });

    function cleanupListeners(){
      if(unsubObras) unsubObras();
      if(unsubAllObras) unsubAllObras();
      Object.values(adminUnsubMap).forEach(fn=>fn());
      adminUnsubMap={}; allUsersData={};
      adminSelectedUid=null; adminSelectedObraId=null;
      colabFormReady=false;
    }

    async function findDisabledDocByEmail(email){
      const q = query(collection(db,'users'), where('email','==',email), where('disabled','==',true));
      const snap = await getDocs(q);
      if(snap.empty) return null;
      const d = snap.docs[0];
      return { uid: d.id, ...d.data() };
    }

    // ══════════════════════════════════════════════════════════════
    // CURVA S — função única padronizada para admin e colaborador
    // ══════════════════════════════════════════════════════════════
    function chartBarConfig(n){
      const isMobile = window.innerWidth <= 640;
      const minBar   = isMobile ? 8  : 18;
      const maxBar   = isMobile ? 18 : 40;
      const space    = isMobile ? Math.max(160, window.innerWidth - 48) : 600;
      const thickness = Math.max(minBar, Math.min(maxBar, Math.floor(space / (n||1))));
      const minCanvasWidth = n > 0 ? Math.max(0, n * (thickness + 14)) : 0;
      return { thickness, minCanvasWidth };
    }

    function renderCurvaS(canvasId, scrollWrapId, itens, prevChart){
      const canvas = $(canvasId);
      if(!canvas) return prevChart;
      if(prevChart) prevChart.destroy();

      const theme = document.documentElement.dataset.theme;
      const gc = theme==='dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
      const tc = theme==='dark' ? '#94a3b8' : '#64748b';

      const n = itens.length;
      const { thickness, minCanvasWidth } = chartBarConfig(n);
      const isMobile = window.innerWidth <= 640;
      const scrollWrap = $(scrollWrapId);

      if(scrollWrap){
        if(minCanvasWidth > scrollWrap.offsetWidth){
          scrollWrap.style.overflowX = 'auto';
          scrollWrap.style.webkitOverflowScrolling = 'touch';
          canvas.style.minWidth = minCanvasWidth + 'px';
        } else {
          scrollWrap.style.overflowX = 'hidden';
          canvas.style.minWidth = '';
        }
      }

      return new Chart(canvas.getContext('2d'),{
        type: 'bar',
        data: {
          labels: itens.map(r => String(r.item||'')),
          datasets: [{
            label: '% Executado',
            data: itens.map(r => Number(r.percentualExecutado)||0),
            backgroundColor: 'rgba(99,102,241,0.2)',
            borderColor: '#6366f1',
            borderWidth: 1,
            borderRadius: 3,
            barThickness: thickness
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          categoryPercentage: 0.8,
          barPercentage: 0.85,
          scales: {
            y: { beginAtZero:true, max:100, grid:{color:gc}, ticks:{color:tc, callback:v=>v+'%'} },
            x: { grid:{display:false}, ticks:{color:tc, font:{size: isMobile ? 9 : 10}, maxRotation:45, minRotation:0} }
          },
          plugins: { legend: { labels: { color:tc } } }
        }
      });
    }

    // ══ ADMIN VIEW ════════════════════════════════════════════════════════
    function initAdminView(){
      showView('adminView');
      listenAllUsers();
      if(!colabFormReady){
        colabFormReady = true;
        setupAdminColabForm();
      }
      $('adminToggleColab').onclick = ()=>{
        const p=$('adminColabPanel');
        p.style.display=p.style.display==='none'?'block':'none';
      };
    }

    function listenAllUsers(){
      if(unsubAllObras) unsubAllObras();
      unsubAllObras = onSnapshot(collection(db,'users'), snap => {
        snap.docChanges().forEach(change => {
          const d = change.doc;
          const data = d.data();
          if(data.disabled){
            if(allUsersData[d.id]){
              delete allUsersData[d.id];
              if(adminUnsubMap[d.id]){ adminUnsubMap[d.id](); delete adminUnsubMap[d.id]; }
            }
            return;
          }
          if(change.type==='removed'){
            delete allUsersData[d.id];
            if(adminUnsubMap[d.id]){ adminUnsubMap[d.id](); delete adminUnsubMap[d.id]; }
            return;
          }
          if(!allUsersData[d.id]) allUsersData[d.id]={nome:data.nome||data.email,email:data.email,role:data.role,blocked:!!data.blocked,obras:[]};
          else {
            allUsersData[d.id].nome    = data.nome||data.email;
            allUsersData[d.id].email   = data.email;
            allUsersData[d.id].role    = data.role;
            allUsersData[d.id].blocked = !!data.blocked;
          }
          if(data.role!=='admin' && !adminUnsubMap[d.id]){
            adminUnsubMap[d.id] = onSnapshot(collection(db,'users',d.id,'obras'), oSnap => {
              allUsersData[d.id].obras = oSnap.docs.map(o=>({id:o.id,...o.data()}));
              renderAdminStats(); renderAdminColabSidebar(); renderColabList();
              if(adminSelectedUid===d.id) renderAdminObraDetail();
            });
          }
        });
        renderAdminStats(); renderAdminColabSidebar(); renderColabList();
      });
    }

    function renderAdminColabSidebar(){
      const box=$('adminColabSidebar'); if(!box) return;
      const colabs=Object.entries(allUsersData).filter(([,u])=>u.role!=='admin');
      if(!colabs.length){ box.innerHTML='<p style="color:var(--text-muted);font-size:.8rem;padding:.5rem">Nenhum colaborador ainda.</p>'; return; }

      if(adminSelectedUid && allUsersData[adminSelectedUid]){
        const u = allUsersData[adminSelectedUid];
        const n = (u.obras||[]).length;
        const lockIcon = u.blocked ? '\uD83D\uDD12 ' : '';
        box.innerHTML =
          `<button class="btn btn-sec" onclick="adminDeselectColab()" style="width:100%;margin-bottom:.75rem;font-size:.8rem;justify-content:flex-start;gap:.4rem">← Todos</button>` +
          `<div class="colab-sidebar-item active">
            <div style="font-weight:600;font-size:.875rem">${lockIcon}${esc(u.nome)}${u.blocked?' <span style="font-size:.7rem;color:var(--danger)">(Bloqueado)</span>':''}</div>
            <div style="font-size:.75rem;color:var(--text-muted)">${n} obra${n!==1?'s':''}</div>
          </div>`;
        return;
      }

      box.innerHTML=colabs.map(([uid,u])=>{
        const n=(u.obras||[]).length;
        const lockIcon = u.blocked ? '\uD83D\uDD12 ' : '';
        const blockedStyle = u.blocked ? 'opacity:.55' : '';
        return `<div class="colab-sidebar-item" style="${blockedStyle}" onclick="adminSelectColab('${uid}')">
          <div style="font-weight:600;font-size:.875rem">${lockIcon}${esc(u.nome)}</div>
          <div style="font-size:.75rem;color:var(--text-muted)">${n} obra${n!==1?'s':''}</div>
        </div>`;
      }).join('');
    }

    window.adminSelectColab = uid => {
      adminSelectedUid=uid; adminSelectedObraId=null;
      renderAdminColabSidebar(); renderAdminObraDetail();
    };

    window.adminDeselectColab = () => {
      adminSelectedUid=null; adminSelectedObraId=null;
      renderAdminColabSidebar(); renderAdminObraDetail();
    };

    function renderAdminObraDetail(){
      const panel=$('adminDetailPanel'); if(!panel) return;
      if(!adminSelectedUid){ panel.innerHTML='<p style="color:var(--text-muted);padding:1rem">Selecione um colaborador ao lado para ver as obras.</p>'; return; }
      const u=allUsersData[adminSelectedUid];
      if(!u){ panel.innerHTML=''; return; }
      const obrasList=u.obras||[];

      let html=`<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem">
        <div style="font-weight:700;font-size:1.1rem">👤 ${esc(u.nome)}${u.blocked?` <span style="font-size:.75rem;background:rgba(239,68,68,.12);color:var(--danger);padding:.2rem .6rem;border-radius:999px;font-weight:600">🔒 Bloqueado</span>`:''}</div>
        <div class="form-group" style="margin:0;min-width:220px">
          <select id="adminObraSelect" class="form-control" onchange="adminSelectObra(this.value)">
            <option value="">-- Selecione uma obra --</option>
            ${obrasList.map(o=>`<option value="${o.id}" ${o.id===adminSelectedObraId?'selected':''}>${esc(o.nome||'Obra')}</option>`).join('')}
          </select>
        </div>
      </div>`;

      if(!adminSelectedObraId||!obrasList.length){
        html += obrasList.length ? obrasList.map(adminObraCardHTML).join('') : '<p style="color:var(--text-muted)">Este colaborador não tem obras cadastradas.</p>';
        panel.innerHTML=html; return;
      }

      const obra=obrasList.find(o=>o.id===adminSelectedObraId);
      if(!obra){ panel.innerHTML=html+'<p style="color:var(--text-muted)">Obra não encontrada.</p>'; return; }

      const itens   = Array.isArray(obra.itens) ? obra.itens : [];
      const totalAcum = itens.reduce((a,i)=>a+(Number(i.acumulado)||0),0);
      const totalMed  = itens.reduce((a,i)=>a+(Number(i.medicao)||0),0);
      const vcAditivo = Number(obra.resumo?.valorContratoAditivo) || itens.reduce((a,i)=>a+(Number(i.valorContrato)||0),0);
      const acumTotal = Number(obra.resumo?.acumuladoTotal)       || totalAcum;
      const pct = calcPctGeral(obra.resumo, itens);

      html+=`
      <div class="admin-stats-grid">
        <div class="stat-card compact"><span class="stat-label">Valor CT / Aditivo</span><span class="stat-value">${fmtMoney(vcAditivo)}</span></div>
        <div class="stat-card compact"><span class="stat-label">Acumulado Total</span><span class="stat-value" style="color:var(--success)">${fmtMoney(acumTotal)}</span></div>
        <div class="stat-card compact"><span class="stat-label">% Geral</span><span class="stat-value">${pct.toFixed(2)}%</span></div>
        <div class="stat-card compact"><span class="stat-label">Medição Atual</span><span class="stat-value">${esc(obra.medicaoAtual||'-')}</span></div>
        <div class="stat-card compact"><span class="stat-label">Acumulado (itens)</span><span class="stat-value">${fmtMoney(totalAcum)}</span></div>
        <div class="stat-card compact"><span class="stat-label">Medição</span><span class="stat-value">${fmtMoney(totalMed)}</span></div>
        <div class="stat-card compact"><span class="stat-label">Saldo</span><span class="stat-value">${fmtMoney(vcAditivo-acumTotal)}</span></div>
      </div>
      <div class="panel" style="margin-bottom:1.5rem">
        <h3 style="margin-bottom:1rem">Curva S — Progresso Físico</h3>
        <div class="chart-scroll-wrap" id="adminCurvaSwrap"><div class="chart-container"><canvas id="adminCurvaS"></canvas></div></div>
      </div>
      <div class="panel">
        <h3 style="margin-bottom:1rem">Índice de Itens</h3>
        <div class="table-container">
          <table><thead><tr>
            <th class="th-sticky">Item</th><th class="th-sticky">Descrição</th>
            <th class="th-sticky" style="text-align:right">Valor Contrato</th>
            <th class="th-sticky" style="text-align:right">Medição</th>
            <th class="th-sticky" style="text-align:right">Acumulado</th>
            <th class="th-sticky" style="text-align:right">Saldo</th>
            <th class="th-sticky" style="text-align:right">% Exec.</th>
          </tr></thead>
          <tbody>${itens.map(r=>`<tr>
            <td>${esc(r.item)}</td><td class="td-desc">${esc(r.descricao)}</td>
            <td style="text-align:right">${fmtMoney(r.valorContrato)}</td>
            <td style="text-align:right">${fmtMoney(r.medicao)}</td>
            <td style="text-align:right">${fmtMoney(r.acumulado)}</td>
            <td style="text-align:right">${fmtMoney(r.saldo)}</td>
            <td style="text-align:right;font-weight:700;color:${Number(r.percentualExecutado)>=99.5?'var(--success)':'var(--text)'}">${Number(r.percentualExecutado||0).toFixed(2)}%</td>
          </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`;

      panel.innerHTML=html;
      requestAnimationFrame(()=>{
        adminChartInstance = renderCurvaS('adminCurvaS', 'adminCurvaSwrap', itens, adminChartInstance);
      });
    }

    window.adminSelectObra = obraId => { adminSelectedObraId=obraId||null; renderAdminObraDetail(); };

    function adminObraCardHTML(obra){
      const itens     = Array.isArray(obra.itens) ? obra.itens : [];
      const vcAditivo = Number(obra.resumo?.valorContratoAditivo) || itens.reduce((a,i)=>a+(Number(i.valorContrato)||0),0);
      const acumTotal = Number(obra.resumo?.acumuladoTotal)       || itens.reduce((a,i)=>a+(Number(i.acumulado)||0),0);
      const pct = calcPctGeral(obra.resumo, itens);
      return `<div class="obra-card" style="cursor:pointer" onclick="adminSelectObra('${obra.id}')">
        <div class="obra-card-header">
          <div><div class="obra-card-title">${esc(obra.nome||'Sem nome')}</div>
          <div class="obra-card-sub">${itens.length} itens &nbsp;|&nbsp; Aba: ${esc(obra.medicaoAtual||'-')}</div></div>
          <div class="obra-card-pct">${pct.toFixed(2)}%</div>
        </div>
        <div class="obra-progress-bar"><div class="obra-progress-fill" style="width:${Math.min(100,pct)}%"></div></div>
        <div class="obra-card-footer">
          <span>CT/Aditivo: ${fmtMoney(vcAditivo)}</span><span>Acumulado: ${fmtMoney(acumTotal)}</span><span>Saldo: ${fmtMoney(vcAditivo-acumTotal)}</span>
        </div>
      </div>`;
    }

    function renderAdminStats(){
      let tot=0, tit=0, tvc=0, tac=0;
      Object.values(allUsersData).forEach(u=>{
        if(u.role==='admin') return;
        (u.obras||[]).forEach(o=>{
          tot++;
          const it = Array.isArray(o.itens) ? o.itens : [];
          tit += it.length;
          tvc += Number(o.resumo?.valorContratoAditivo) || it.reduce((a,i)=>a+(Number(i.valorContrato)||0),0);
          tac += Number(o.resumo?.acumuladoTotal)       || it.reduce((a,i)=>a+(Number(i.acumulado)||0),0);
        });
      });
      const pg = tvc > 0 ? (tac/tvc*100).toFixed(2) : 0;
      $('adminStats').innerHTML=`
        <div class="stat-card"><span class="stat-label">Total de Obras</span><span class="stat-value">${tot}</span></div>
        <div class="stat-card"><span class="stat-label">Total de Itens</span><span class="stat-value">${tit}</span></div>
        <div class="stat-card"><span class="stat-label">% Geral</span><span class="stat-value">${pg}%</span></div>
        <div class="stat-card"><span class="stat-label">Acumulado Geral</span><span class="stat-value" style="font-size:1.1rem">${fmtMoney(tac)}</span></div>`;
    }

    function renderColabList(){
      const box=$('colabList'); if(!box) return;
      const colabs=Object.entries(allUsersData).filter(([,u])=>u.role!=='admin');
      if(!colabs.length){box.innerHTML='<p style="color:var(--text-muted);font-size:.875rem">Nenhum colaborador cadastrado.</p>';return;}
      box.innerHTML=colabs.map(([uid,u])=>{
        const bloqueado = u.blocked;
        return `<div class="colab-item" style="${bloqueado?'opacity:.7':''}">
          <div>
            <strong>${esc(u.nome)}</strong>
            ${bloqueado?'<span style="margin-left:.5rem;font-size:.7rem;background:rgba(239,68,68,.12);color:var(--danger);padding:.1rem .4rem;border-radius:999px">🔒 Bloqueado</span>':''}
            <br><small style="color:var(--text-muted)">${esc(u.email)}</small>
          </div>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap">
            <button class="btn ${bloqueado?'btn-success':'btn-warning'}" style="padding:.3rem .65rem;font-size:.72rem" onclick="toggleBloqueio('${uid}',${bloqueado})">
              ${bloqueado?'✅ Desbloquear':'🔒 Bloquear'}
            </button>
            <button class="btn btn-danger" style="padding:.3rem .65rem;font-size:.72rem" onclick="removeColab('${uid}')">Remover</button>
          </div>
        </div>`;
      }).join('');
    }

    window.toggleBloqueio = async (uid, isBlocked) => {
      const novoEstado = !isBlocked;
      const msg = novoEstado
        ? 'Bloquear este colaborador? Ele não conseguirá mais fazer login até ser desbloqueado.'
        : 'Desbloquear este colaborador? Ele poderá fazer login normalmente.';
      if(!confirm(msg)) return;
      try{
        await updateDoc(doc(db,'users',uid),{ blocked: novoEstado });
        allUsersData[uid].blocked = novoEstado;
        renderColabList(); renderAdminColabSidebar();
        if(adminSelectedUid===uid) renderAdminObraDetail();
        alert(novoEstado ? 'Colaborador bloqueado com sucesso.' : 'Colaborador desbloqueado com sucesso.');
      }catch(err){ alert('Erro: '+err.message); }
    };

    window.removeColab = async uid => {
      if(!confirm('Remover este colaborador? Ele perderá acesso ao sistema.')) return;
      try{
        await updateDoc(doc(db,'users',uid),{disabled:true});
        delete allUsersData[uid];
        if(adminUnsubMap[uid]){adminUnsubMap[uid]();delete adminUnsubMap[uid];}
        if(adminSelectedUid===uid){adminSelectedUid=null;adminSelectedObraId=null;}
        renderAdminStats(); renderAdminColabSidebar(); renderColabList(); renderAdminObraDetail();
        alert('Colaborador removido com sucesso.');
      }catch(err){ alert('Erro ao remover: '+err.message); }
    };

    function setupAdminColabForm(){
      $('addColabForm').addEventListener('submit', async e=>{
        e.preventDefault();
        const nome  = $('colabNome').value.trim();
        const email = $('colabEmail').value.trim();
        const senha = $('colabSenha').value;
        if(!nome||!email||!senha) return;
        const btn   = $('addColabBtn');
        if(btn.disabled) return;
        btn.disabled=true; btn.textContent='Cadastrando...';
        const msgEl = $('colabMsgError');
        msgEl.style.display='none';
        const adminEmail = currentUser.email;
        try{
          const cred = await createUserWithEmailAndPassword(auth, email, senha);
          await setDoc(doc(db,'users',cred.user.uid),{
            nome, email, role:'colaborador', criadoEm:Date.now(), disabled:false, blocked:false
          });
          await signOut(auth);
          await signInWithEmailAndPassword(auth, adminEmail, ADMIN_SENHA);
          $('colabNome').value=''; $('colabEmail').value=''; $('colabSenha').value='';
          alert(`Colaborador "${nome}" cadastrado com sucesso!`);
        }catch(err){
          if(err.code==='auth/email-already-in-use'){
            try{
              const disabledDoc = await findDisabledDocByEmail(email);
              if(disabledDoc && disabledDoc._tmpPwd){
                const reativCred = await signInWithEmailAndPassword(auth, email, disabledDoc._tmpPwd);
                await updatePassword(reativCred.user, senha);
                await setDoc(doc(db,'users',reativCred.user.uid),{
                  nome, email, role:'colaborador', criadoEm:Date.now(), disabled:false, blocked:false, _tmpPwd:null
                },{merge:true});
                await signOut(auth);
                await signInWithEmailAndPassword(auth, adminEmail, ADMIN_SENHA);
                $('colabNome').value=''; $('colabEmail').value=''; $('colabSenha').value='';
                alert(`Colaborador "${nome}" reativado com sucesso e senha atualizada!`);
              } else {
                const reativCred2 = await signInWithEmailAndPassword(auth, email, senha);
                await setDoc(doc(db,'users',reativCred2.user.uid),{
                  nome, email, role:'colaborador', criadoEm:Date.now(), disabled:false, blocked:false
                },{merge:true});
                await signOut(auth);
                await signInWithEmailAndPassword(auth, adminEmail, ADMIN_SENHA);
                $('colabNome').value=''; $('colabEmail').value=''; $('colabSenha').value='';
                alert(`Colaborador "${nome}" reativado com sucesso!`);
              }
            }catch(err2){
              let msg = 'Erro ao reativar a conta.';
              if(err2.code==='auth/wrong-password'||err2.code==='auth/invalid-credential')
                msg = 'Não foi possível reativar automaticamente. Remova e recadastre com outro e-mail.';
              else msg = err2.message;
              try{ await signInWithEmailAndPassword(auth, adminEmail, ADMIN_SENHA); }catch(_){}
              msgEl.textContent=msg; msgEl.style.display='block';
            }
          } else if(err.code==='auth/weak-password'){
            msgEl.textContent='A senha deve ter pelo menos 6 caracteres.';
            msgEl.style.display='block';
          } else if(err.code==='auth/invalid-email'){
            msgEl.textContent='E-mail inválido.';
            msgEl.style.display='block';
          } else {
            msgEl.textContent=err.message;
            msgEl.style.display='block';
          }
        }finally{
          btn.disabled=false; btn.textContent='Cadastrar colaborador';
        }
      });
    }

    function initUserView(){
      getDoc(doc(db,'users',currentUser.uid)).then(snap=>{
        if(!snap.exists()){ cleanupListeners(); signOut(auth); return; }
        const data = snap.data();
        if(data.disabled===true){
          alert('Sua conta foi desativada. Entre em contato com o administrador.');
          cleanupListeners(); signOut(auth); return;
        }
        if(data.blocked===true){
          alert('Seu acesso está temporariamente bloqueado. Entre em contato com o administrador.');
          cleanupListeners(); signOut(auth); return;
        }
        showView('appView');
        obras=[];selectedObraId=null;rows=[];
        listenUserObras();
      });
    }

    function listenUserObras(){
      if(unsubObras) unsubObras();
      unsubObras=onSnapshot(collection(db,'users',currentUser.uid,'obras'),snap=>{
        obras=snap.docs.map(d=>({id:d.id,...d.data()}));
        if(!selectedObraId&&obras.length) selectedObraId=obras[0].id;
        if(selectedObraId){const o=obras.find(x=>x.id===selectedObraId);if(o) applySelected(o);}
        renderAll();
      });
    }

    async function saveObraFirestore(obra){ await setDoc(doc(db,'users',currentUser.uid,'obras',obra.id),obra); }
    async function deleteObraFirestore(id){ await deleteDoc(doc(db,'users',currentUser.uid,'obras',id)); }

    function applySelected(o){rows=Array.isArray(o.itens)?o.itens:[];sourceContrato=o;$('projName').value=o.nomeProjeto||o.nome||'Nova obra';$('projClient').value=o.cliente||'';$('projScope').value=o.medicaoAtual||'';}
    function currentObra(){return obras.find(o=>o.id===selectedObraId);}

    function renderObrasBox(){
      const box=$('obrasBox');if(!box)return;
      box.innerHTML=`<div class="form-group" style="margin-bottom:0"><label>Selecionar obra</label><select id="obraSelect" class="form-control">${obras.map(o=>`<option value="${o.id}" ${o.id===selectedObraId?'selected':''}>${esc(o.nome||'Obra')}</option>`).join('')}</select></div><div style="display:flex;gap:.5rem;flex-wrap:wrap"><button class="btn btn-sec" id="openObraBtn">Abrir</button><button class="btn btn-sec" id="replaceObraBtn">Atualizar</button><button class="btn btn-danger" id="deleteObraBtn">Remover</button></div>`;
      $('obraSelect').onchange=e=>{selectedObraId=e.target.value;const o=currentObra();if(o){applySelected(o);renderAll();}};
      $('openObraBtn').onclick=()=>{const o=currentObra();if(o){applySelected(o);renderAll();}};
      $('replaceObraBtn').onclick=()=>loadFromJsonOrExcel(true);
      $('deleteObraBtn').onclick=async()=>{if(!selectedObraId||!confirm('Remover obra?'))return;await deleteObraFirestore(selectedObraId);selectedObraId=null;};
    }

    function renderTable(){
      $('tbody').innerHTML=rows.map((r,i)=>`<tr data-i="${i}">
        <td contenteditable="true" data-k="item">${esc(r.item)}</td>
        <td contenteditable="true" data-k="descricao" class="td-desc">${esc(r.descricao)}</td>
        <td contenteditable="true" data-k="valorContrato" style="text-align:right">${fmtMoney(r.valorContrato)}</td>
        <td contenteditable="true" data-k="medicao" style="text-align:right">${fmtMoney(r.medicao)}</td>
        <td contenteditable="true" data-k="acumulado" style="text-align:right">${fmtMoney(r.acumulado)}</td>
        <td contenteditable="true" data-k="saldo" style="text-align:right">${fmtMoney(r.saldo)}</td>
        <td contenteditable="true" data-k="percentualExecutado" style="text-align:right;font-weight:700">${Number(r.percentualExecutado||0).toFixed(2)}</td>
        <td style="text-align:right"><button data-del="${i}" class="btn btn-danger" style="padding:.4rem;border-radius:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events:none"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button></td>
      </tr>`).join('');
    }

    function updateDashboard(){
      const o = currentObra();
      const vcAditivo = Number(o?.resumo?.valorContratoAditivo) || rows.reduce((a,r)=>a+(Number(r.valorContrato)||0),0);
      const acumTotal = Number(o?.resumo?.acumuladoTotal)       || rows.reduce((a,r)=>a+(Number(r.acumulado)||0),0);
      const pct = calcPctGeral(o?.resumo, rows);
      $('stats').innerHTML=`
        <div class="stat-card">
          <span class="stat-label">Valor CT / Aditivo</span>
          <span class="stat-value" style="font-size:1rem">${fmtMoney(vcAditivo)}</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Acumulado Total</span>
          <span class="stat-value" style="font-size:1rem;color:var(--success)">${fmtMoney(acumTotal)}</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">% Geral</span>
          <span class="stat-value">${pct.toFixed(2)}%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Medição Atual</span>
          <span class="stat-value" style="font-size:1.2rem">${esc(o?.medicaoAtual||'-')}</span>
        </div>`;
      $('countAll').textContent = fmtMoney(vcAditivo);
      $('countDone').textContent = fmtMoney(acumTotal);
      $('countPct').textContent  = pct.toFixed(2)+'%';
      chartInstance = renderCurvaS('sCurveChart', 'sCurveScrollWrap', rows, chartInstance);
    }

    function renderAll(){renderObrasBox();renderTable();updateDashboard();}
