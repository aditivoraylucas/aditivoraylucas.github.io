<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gerador de Projeto Básico</title>

<!-- Bibliotecas para gerar o PDF -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root {
  --page-w: 794px;
  --page-h: 1123px;
  --font: "Times New Roman", Times, serif;
  --fs: 12px;
  --lh: 1.12;
}

/* Reseta layout básico */
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #dfe4ea;
  color: #111;
  font-family: var(--font);
}

/* Barra superior */
.top {
  position: sticky;
  top: 0;
  background: #111827;
  color: #fff;
  padding: 12px 16px;
  font-family: Arial, sans-serif;
  z-index: 10;
}

/* Layout 2 colunas: painel + prévia */
.wrap {
  max-width: 1800px;
  margin: 0 auto;
  padding: 16px;
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 16px;
}

.panel,
.sheet {
  background: #fff;
  border: 1px solid #bfc6cf;
  border-radius: 6px;
  box-shadow: 0 3px 18px rgba(0,0,0,.07);
}

.panel {
  padding: 14px;
  overflow: auto;
  max-height: calc(100vh - 88px);
}

.sheet {
  overflow: auto;
  max-height: calc(100vh - 88px);
}

/* Formulário */
label {
  display: block;
  font-family: Arial, sans-serif;
  font-size: 12px;
  margin: 10px 0 4px;
}

input,
textarea,
select {
  width: 100%;
  border: 1px solid #b8c1cc;
  border-radius: 4px;
  padding: 8px 9px;
  font-family: Arial, sans-serif;
  font-size: 13px;
}

textarea {
  min-height: 64px;
  resize: vertical;
}

.btns {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

button {
  border: 0;
  border-radius: 6px;
  padding: 10px 14px;
  font-weight: 700;
  cursor: pointer;
}

.primary { background: #16a34a; color: #fff; }
.secondary { background: #374151; color: #fff; }

/* Páginas do documento */
.doc-page {
  width: var(--page-w);
  min-height: var(--page-h);
  margin: 0 auto;
  padding: 26px 32px;
  background: #fff;
  font-family: var(--font);
  font-size: var(--fs);
  line-height: var(--lh);
  color: #111;
}

.break { page-break-after: always; }

/* Cabeçalho de página */
.hdr {
  display: grid;
  grid-template-columns: 80px 1fr 220px;
  align-items: start;
  margin-bottom: 32px;
}

.logo {
  width: 62px;
  height: 62px;
  object-fit: contain;
}

.headcenter { text-align: center; }

.headtitle {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: .2px;
  margin-top: 2px;
}

.headline {
  height: 2px;
  background: #5b5b8a;
  width: 250px;
  margin: 4px auto 0;
}

.headright {
  text-align: right;
  font-size: 14px;
  line-height: 1.1;
  padding-top: 8px;
}

.headleft {
  font-size: 14px;
  line-height: 1.1;
  padding-top: 8px;
}

.titlebox {
  display: inline-block;
  border: 1px solid #000;
  padding: 12px 10px;
  width: 430px;
  text-align: left;
  font-size: 15px;
  line-height: 1.12;
  margin-top: 72px;
}

/* Títulos e textos */
.section {
  font-size: 14px;
  font-weight: 700;
  margin: 16px 0 10px;
}

.sub {
  font-size: 13px;
  font-weight: 700;
  margin: 14px 0 8px;
}

.p {
  margin: 0 0 8px;
  text-align: justify;
}

/* Listas e tabelas */
ul {
  margin: 6px 0 8px 18px;
  padding: 0;
}

li {
  margin: 0 0 8px;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin: 0 0 10px;
}

td,
th {
  border: 1px solid #000;
  padding: 5px 6px;
  vertical-align: top;
}

th {
  text-align: center;
}

.small td,
.small th {
  font-size: 11.6px;
}

/* Rodapé e assinaturas */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 10px;
  font-size: 12px;
  color: #445;
}

.sign {
  text-align: center;
  margin-top: 46px;
}

.name { font-weight: 700; }

/* Destaque de campos variáveis */
.field {
  background: #fff4a8;
  padding: 0 3px;
  border-radius: 2px;
}

.note {
  font-family: Arial, sans-serif;
  font-size: 11px;
  color: #555;
  margin-top: 6px;
}

/* Impressão */
@media print {
  body { background: #fff; }
  .top, .panel { display: none; }
  .wrap { display: block; padding: 0; }
  .sheet {
    border: 0;
    box-shadow: none;
    overflow: visible;
    max-height: none;
  }
  .doc-page {
    margin: 0;
    width: auto;
    min-height: auto;
    box-shadow: none;
  }
  .break { page-break-after: always; }
}
</style>
</head>
<body>
<div class="top">Gerador padronizado completo para PDF</div>

<div class="wrap">
  <!-- Painel de entrada de dados -->
  <div class="panel">
    <label>Contrato</label>
    <input id="contrato" value="">

    <label>Concorrência</label>
    <input id="conc" value="">

    <label>PAC</label>
    <input id="pac" value="">

    <label>Empresa</label>
    <input id="empresa" value="">

    <label>Secretaria</label>
    <input id="secretaria" value="">

    <label>Tipo (ex.: Acréscimo de Quantitativo no Contrato)</label>
    <input id="tipo" value="">

    <label>Órgão</label>
    <input id="orgao" value="">

    <label>CNPJ</label>
    <input id="cnpj" value="">

    <label>Endereço</label>
    <input id="endereco" value="">

    <label>Cidade</label>
    <input id="cidade" value="">

    <label>UF</label>
    <input id="uf" value="">

    <label>CEP</label>
    <input id="cep" value="">

    <label>Telefone</label>
    <input id="tel" value="">

    <label>Título do Projeto</label>
    <textarea id="titulo"></textarea>

    <label>Identificação do Objeto</label>
    <textarea id="objeto"></textarea>

    <label>Justificativa (texto principal)</label>
    <textarea id="just"></textarea>

    <label>Lista de Itens (cada item em uma linha)</label>
    <textarea id="itens"></textarea>

    <label>Valor total</label>
    <input id="valor_total" value="">

    <label>Valor itens novos</label>
    <input id="valor_itens" value="">

    <label>Valor quantitativos</label>
    <input id="valor_quant" value="">

    <label>Valor inicial do contrato</label>
    <input id="valor_inicial" value="">

    <label>Valor atualizado do contrato</label>
    <input id="valor_atualizado" value="">

    <label>Limite legal</label>
    <input id="limite" value="">

    <label>Saldo para aditivo</label>
    <input id="saldo" value="">

    <label>Data</label>
    <input id="data" value="">

    <label>Assinatura 1 (nome)</label>
    <input id="ass1" value="">

    <label>Cargo 1</label>
    <input id="car1" value="">

    <label>Assinatura 2 (nome)</label>
    <input id="ass2" value="">

    <label>Cargo 2</label>
    <input id="car2" value="">

    <div class="btns">
      <button class="primary" onclick="render()">Atualizar prévia</button>
      <button class="secondary" onclick="baixarPDF()">Baixar PDF</button>
    </div>

    <div class="note">
      Preencha os campos acima. O número de contrato, concorrência, PAC e valores serão
      repetidos automaticamente em todas as páginas do PDF.
    </div>
  </div>

  <!-- Prévia do documento -->
  <div class="sheet">
    <div id="preview"></div>
  </div>
</div>

<script>
const v = id => document.getElementById(id).value.trim();

const contract = () =>
  `Contrato n.º ${v('contrato')} vinculado à Concorrência n.º ${v('conc')}, PAC n.º ${v('pac')}`;

function header() {
  return `
    <div class="hdr">
      <div>
        <img class="logo" alt="logo"
             src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Coat_of_arms_of_Igarape_MG.png/120px-Coat_of_arms_of_Igarape_MG.png">
      </div>
      <div class="headcenter">
        <div class="headtitle">Prefeitura Municipal de Igarapé</div>
        <div class="headline"></div>
      </div>
      <div></div>
    </div>
  `;
}

function render() {
  const itensHtml = v('itens')
    ? v('itens').split('\n').map(s => s.trim()).filter(Boolean).map(s => `<li>${s}</li>`).join('')
    : '';

  document.getElementById('preview').innerHTML = `
  <!-- Página 1: capa -->
  <section class="doc-page break">
    <div class="hdr">
      <div>
        <img class="logo" alt="logo"
             src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Coat_of_arms_of_Igarape_MG.png/120px-Coat_of_arms_of_Igarape_MG.png">
      </div>
      <div class="headcenter">
        <div class="headtitle">Prefeitura Municipal de Igarapé</div>
        <div class="headline"></div>
        <div class="titlebox">
          <span class="field"><b>PROJETO BÁSICO PARA:</b> ${v('tipo')}</span>
          <span class="field">${contract()}</span>,
          referente à empresa <span class="field">${v('empresa')}</span>.
        </div>
      </div>
      <div class="headright">
        <div>${v('secretaria')}</div>
        <div>${v('tel')}</div>
        <div>${v('endereco').toUpperCase()}</div>
      </div>
    </div>

    <div class="footer">
      <div>${v('secretaria') || ''}</div>
      <div>${v('tel')}<br>${v('endereco').toUpperCase()}</div>
    </div>
  </section>

  <!-- Página 2: dados e descrição -->
  <section class="doc-page break">
    ${header()}

    <div class="section">1. DADOS DA INSTITUIÇÃO</div>
    <table>
      <tr>
        <td><b>Órgão/ Entidade Proponente</b></td>
        <td><b>Nº do CNPJ</b></td>
      </tr>
      <tr>
        <td>${v('orgao')}</td>
        <td>${v('cnpj')}</td>
      </tr>
      <tr>
        <td colspan="2"><b>Endereço:</b> ${v('endereco')}</td>
      </tr>
      <tr>
        <td>
          <b>Cidade:</b> ${v('cidade')}
          &nbsp;&nbsp; <b>U.F.:</b> ${v('uf')}
          &nbsp;&nbsp; <b>CEP:</b> ${v('cep')}
          &nbsp;&nbsp; <b>Telefone:</b> ${v('tel')}
        </td>
        <td></td>
      </tr>
    </table>

    <div class="section">2. DESCRIÇÃO DO PROJETO</div>

    <div class="sub">2.1. TITULO DO PROJETO</div>
    <p class="p"><span class="field">${v('titulo')}</span></p>

    <div class="sub">2.2. IDENTIFICAÇÃO DO OBJETO</div>
    <p class="p"><span class="field">${v('objeto')}</span></p>

    <div class="sub">2.3. JUSTIFICATIVA</div>
    <p class="p">${v('just').replace(/\n/g, '<br><br>')}</p>
  </section>

  <!-- Página 3: itens e valor -->
  <section class="doc-page break">
    ${header()}

    ${itensHtml ? `<ul>${itensHtml}</ul>` : ''}

    <div class="sub">2.4. DO VALOR</div>
    <p class="p">
      Acréscimo: O valor total do presente Termo Aditivo é de
      <span class="field">${v('valor_total')}</span>,
      sendo <span class="field">${v('valor_itens')}</span> de itens novos e
      <span class="field">${v('valor_quant')}</span> de quantitativos calculados de acordo
      com os valores demonstrados na planilha em Anexo.
    </p>

    <div class="section">3. BASE DE CÁLCULO PARA O ADITIVO</div>
    <div class="sub">3.1. REFERÊNCIAS</div>
    <p class="p">
      A base de cálculo para incidência do percentual de aditivo, até o limite de 25%,
      corresponde ao valor inicial atualizado do contrato, conforme disposto no
      art. 125, § 1º, da Lei nº 14.133/2021.
    </p>
  </section>

  <!-- Página 4: base de cálculo, limite e histórico -->
  <section class="doc-page break">
    ${header()}

    <div class="sub">3.2. CÁLCULO DO VALOR ATUALIZADO DO CONTRATO</div>
    <table class="small">
      <tr>
        <td><b>VALOR INICIAL DO CONTRATO</b></td>
        <td>${v('valor_inicial')}</td>
      </tr>
      <tr>
        <td><b>VALOR ATUALIZADO DO CONTRATO</b></td>
        <td>${v('valor_atualizado')}</td>
      </tr>
    </table>

    <div class="sub">3.3. LIMITE LEGAL PARA ALTERAÇÕES</div>
    <p class="p">
      Assim sendo, o limite legal para alterações no Contrato é de
      <b>${v('limite')}</b>.
    </p>

    <p class="p"><b>3.3.1. ACRÉSCIMO</b></p>
    <table class="small">
      <tr>
        <td><b>LIMITE LEGAL (25%)</b></td>
        <td>${v('limite')}</td>
      </tr>
      <tr>
        <td><b>TERMO ADITIVO 2</b></td>
        <td>${v('valor_total')}</td>
      </tr>
      <tr>
        <td><b>SALDO PARA ADITIVO</b></td>
        <td>${v('saldo')}</td>
      </tr>
    </table>

    <div class="sub">1. HISTÓRICO EVOLUTIVO DO CONTRATO</div>
    <table class="small">
      <tr><th>TERMO</th><th>VALOR</th><th>DESCRIÇÃO</th></tr>
      <tr><td>Contrato ${v('contrato')}</td><td>${v('valor_inicial')}</td><td>Contratação</td></tr>
      <tr><td>1º TERMO ADITIVO</td><td></td><td>PRAZO</td></tr>
      <tr><td>2º TERMO ADITIVO</td><td>${v('valor_total')}</td><td>ADITIVO DE ITENS E QUANTITATIVO</td></tr>
    </table>

    <div class="sub">2. SOLICITAÇÃO ATUAL</div>
    <table class="small">
      <tr><th>TERMO</th><th>VALOR</th><th>DESCRIÇÃO</th></tr>
      <tr><td>3º TA ao Contrato ${v('contrato')}</td><td>${v('valor_total')}</td><td>Acréscimo de quantitativo</td></tr>
    </table>
  </section>

  <!-- Página 5: plano, cronograma, declaração e conclusão -->
  <section class="doc-page">
    ${header()}

    <div class="section">3. PLANO DE APLICAÇÃO</div>
    <table class="small">
      <tr><th>Dotação Orçamentária</th><th>Fonte</th><th>Elemento de Despesa</th></tr>
      <tr>
        <td>OBRAS<br><br>4.4.90.51.00.2.14.00.27.812.0015.1.0073.2.659.050</td>
        <td>1.500/ 1.571/ 2.571</td>
        <td>4.4.90.51.00</td>
      </tr>
    </table>

    <div class="section">4. CRONOGRAMA DE EXECUÇÃO (ETAPA/FASE)</div>
    <table class="small">
      <tr><th>Etapa/ Fase</th><th>Especificação</th><th>Indicador Físico</th></tr>
      <tr>
        <td>Única</td>
        <td>Aditivo de valor referente ao ${contract()}.</td>
        <td>01</td>
      </tr>
    </table>

    <div class="section">5. DECLARAÇÃO</div>
    <p class="p">
      Declaramos que o presente Projeto Básico foi elaborado em conformidade com a Lei nº 14.133,
      de 1º de abril de 2021, observando-se os princípios, diretrizes e requisitos nela estabelecidos,
      bem como as demais normas legais e regulamentares aplicáveis.
    </p>

    <div class="section">6. CONCLUSÃO</div>
    <p class="p">
      Diante do exposto, a Secretaria Gestora do contrato solicita autorização para prosseguir com
      Aditivo de Acréscimo apresentado.
    </p>

    <p class="p" style="text-align:right;">
      ${v('cidade')}, ${v('data')}.
    </p>

    <div class="sign">
      <div class="name">${v('ass1')}</div>
      <div>${v('car1')}</div>
    </div>

    <div class="sign" style="margin-top:48px;">
      <div class="name">${v('ass2')}</div>
      <div>${v('car2')}</div>
    </div>
  </section>
  `;
}

async function baixarPDF() {
  render();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pages = document.querySelectorAll('.doc-page');

  for (let i = 0; i < pages.length; i++) {
    const c = await html2canvas(pages[i], {
      scale: 2,
      backgroundColor: '#fff',
      useCORS: true
    });
    const img = c.toDataURL('image/png');
    const pw = 595.28, ph = 841.89;
    const r = Math.min(pw / c.width, ph / c.height);
    const iw = c.width * r, ih = c.height * r;
    const x = (pw - iw) / 2;
    if (i > 0) doc.addPage();
    doc.addImage(img, 'PNG', x, 0, iw, ih);
  }

  const nome = v('contrato') ? v('contrato').replace('/', '-') : 'projeto-basico';
  doc.save(`projeto-basico-${nome}.pdf`);
}

/* render inicial em branco */
render();
</script>
</body>
</html>
